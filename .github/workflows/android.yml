name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 22
      uses: actions/setup-java@v4
      with:
        java-version: '22'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Run Code Security Checks (Lint)
      run: ./gradlew lintDebug

    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest

    - name: Upload Security Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-and-test-reports
        path: |
          app/build/reports/lint-results-debug.html
          app/build/reports/tests/

  appium-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 22
      uses: actions/setup-java@v4
      with:
        java-version: '22'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APK for Appium
      run: ./gradlew assembleDebug

    - name: Setup Node.js (for Appium)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install and Start Appium Server
      run: |
        npm install -g appium
        appium driver install uiautomator2
        appium &
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Appium-Python-Client openpyxl selenium

    - name: Run Appium Tests on Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: default
        arch: x86
        profile: Nexus 6
        script: python generate_appium_master_report.py

    - name: Upload QA Master Test Inventory
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: QA_Master_Test_Inventory
        path: QA_Master_Test_Inventory.xlsx
